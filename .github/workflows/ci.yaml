name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - beta
      - next

jobs:
  validate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check and coverage
        run: vp run check:full

      - name: Build
        run: vp run build

      - name: Package smoke
        run: vp exec tsx scripts/smoke-package.ts
