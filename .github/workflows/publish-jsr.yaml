name: Publish JSR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check and coverage
        run: vp run check:full

      - name: Build
        run: vp run build

      - name: Package smoke
        run: vp exec tsx scripts/smoke-package.ts

      - name: Publish to JSR
        run: npm exec --yes --package jsr@0.14.3 -- jsr publish
